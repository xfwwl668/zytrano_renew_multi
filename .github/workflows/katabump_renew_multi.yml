name: KataBump Auto Renew Multi (CloakBrowser)

on:
  schedule:
    - cron: '30 2 */2 * *'  # 每两天 UTC 02:30（北京时间 10:30）自动触发一次
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg \
            fonts-noto-cjk \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 || sudo apt-get install -y -qq libasound2

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          python -c "from cloakbrowser import ensure_binary; ensure_binary()"

      - name: 运行 KataBump 续期脚本（含录屏）
        env:
          KATABUMP_ACCOUNTS_JSON: ${{ secrets.KATABUMP_ACCOUNTS_JSON }}
          KATABUMP_EMAIL:         ${{ secrets.KATABUMP_EMAIL }}
          KATABUMP_USERNAME:      ${{ secrets.KATABUMP_USERNAME }}
          KATABUMP_PASSWORD:      ${{ secrets.KATABUMP_PASSWORD }}
          KATABUMP_SERVER_IDS:    ${{ secrets.KATABUMP_SERVER_IDS }}
          KATABUMP_SERVER_URLS:   ${{ secrets.KATABUMP_SERVER_URLS }}
          WXPUSHER_TOKEN:         ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID:           ${{ secrets.WXPUSHER_UID }}

          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          Xvfb :99 -screen 0 1280x720x24 +extension RANDR &
          XVFB_PID=$!
          sleep 2

          ffmpeg -f x11grab -video_size 1280x720 -framerate 15 -i :99 \
            -codec:v libx264 -preset ultrafast -crf 28 \
            -pix_fmt yuv420p -movflags +faststart /tmp/katabump_recording.mp4 \
            > /tmp/katabump_ffmpeg.log 2>&1 &
          RECORD_PID=$!
          sleep 2

          set +e
          timeout 330 python katabump_renew_multi.py
          SCRIPT_EXIT=$?
          set -e
          if [ "$SCRIPT_EXIT" -eq 124 ]; then
            echo "KataBump 脚本达到 330 秒软超时"
          elif [ "$SCRIPT_EXIT" -ne 0 ]; then
            echo "KataBump 脚本退出码: $SCRIPT_EXIT"
          fi

          echo "=== KataBump 截图目录 ==="
          ls -la ./katabump_screenshots/ || echo "无截图"

          sleep 2
          kill $RECORD_PID 2>/dev/null || true
          wait $RECORD_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

          echo "KataBump 录像大小: $(stat -c%s /tmp/katabump_recording.mp4 2>/dev/null || echo 0) bytes"
          exit "$SCRIPT_EXIT"

      - name: 上传 KataBump 截图和录屏
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: katabump-debug-files
          path: |
            ./katabump_screenshots/*.png
            /tmp/katabump_recording.mp4
            /tmp/katabump_ffmpeg.log
          if-no-files-found: ignore
          retention-days: 3

      - name: 清理旧 KataBump workflow 运行记录（保留最新 2 条）
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'katabump_renew_multi.yml',
              per_page: 100,
            });
            const toDelete = workflow_runs.slice(2);
            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              console.log(`Deleted KataBump run #${run.run_number} (id=${run.id})`);
            }
